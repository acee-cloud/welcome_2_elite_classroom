<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Sảnh Chờ Hầm Ngục - Admin</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #121212; color: #fff; text-align: center; margin: 0; padding: 20px; }
        .container { max-width: 1000px; margin: 0 auto; }
        #qr-box { background: white; padding: 15px; width: 160px; height: 160px; margin: 20px auto; border-radius: 10px; box-shadow: 0 0 20px rgba(255,255,255,0.1); }
        #lobby { display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; margin-top: 30px; min-height: 150px; padding: 20px; border: 3px dashed #333; border-radius: 12px; background: #1a1a1a; }
        .player-card { background: #252525; padding: 15px; border-radius: 10px; min-width: 90px; box-shadow: 0 6px 12px rgba(0,0,0,0.5); transform: scale(0); animation: popIn 0.3s forwards; }
        @keyframes popIn { to { transform: scale(1); } }
        .avatar { font-size: 3.5rem; display: block; margin-bottom: 5px; }
        button { background: #ff4757; color: white; border: none; padding: 14px 28px; font-size: 1.3rem; font-weight: bold; cursor: pointer; border-radius: 8px; margin-top: 20px; transition: 0.2s; }
        button:hover { background: #ff6b81; transform: translateY(-2px); }
        button:disabled { background: #444; color: #888; cursor: not-allowed; transform: none; }
        .status-tag { font-size: 1.6rem; font-weight: bold; color: #2ed573; margin: 15px 0; }
        .locked { color: #ff4757; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
</head>
<body>
    <div class="container">
        <h1>🏰 SẢNH CHỜ HẦM NGỤC VẬT LÍ</h1>
        <p style="color: #aaa;">Học sinh quét mã QR dưới đây để tham gia vào lớp học:</p>
        
        <div id="qr-box"></div>

        <div id="room-status" class="status-tag">TRẠNG THÁI: CỬA HẦM ĐANG MỞ 🚪</div>
        
        <button id="lock-btn" onclick="closePortal()">🔒 ĐÓNG CỔNG & BẮT ĐẦU VÀO GAME</button>

        <h2>Anh em đã vào sảnh (<span id="count">0</span>):</h2>
        <div id="lobby"></div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        
        // TỰ ĐỘNG lấy link gốc của Web (Dù chạy ở localhost hay lên mạng internet thật)
        const playerUrl = window.location.origin + '/player.html';
        
        new QRCode(document.getElementById("qr-box"), {
            text: playerUrl,
            width: 160,
            height: 160
        });

        // Báo danh với máy chủ mình là Admin
        socket.emit('register-admin');

        // Cập nhật sảnh chờ khi có học sinh vào/ra
        socket.on('update-lobby', (roomState) => {
            const lobby = document.getElementById('lobby');
            const countSpan = document.getElementById('count');
            lobby.innerHTML = '';
            
            const playersArray = Object.values(roomState.players);
            countSpan.innerText = playersArray.length;

            playersArray.forEach(player => {
                const card = document.createElement('div');
                card.className = 'player-card';
                card.innerHTML = `<span class="avatar">${player.avatar}</span><strong>${player.name}</strong>`;
                lobby.appendChild(card);
            });

            // Nếu Admin đã bấm đóng cửa
            if (roomState.isLocked) {
                document.getElementById('room-status').innerText = 'TRẠNG THÁI: CỬA ĐÃ KHÓA 🎯 TRÒ CHƠI BẮT ĐẦU!';
                document.getElementById('room-status').className = 'status-tag locked';
                document.getElementById('lock-btn').disabled = true;
            }
        });

        function closePortal() {
            socket.emit('lock-room');
        }
    </script>
</body>
</html>
