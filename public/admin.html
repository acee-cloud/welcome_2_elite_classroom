<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Vat Li</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=IBM+Plex+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="/socket.io/socket.io.js"></script>
    <style>
        :root {
            --bg: #0a0e1a; --panel: #111827; --border: #1e3a5f;
            --accent: #00d4ff; --team-a: #ff4d6d; --team-b: #38bdf8; --team-c: #a78bfa;
            --gold: #ffd700; --success: #34d399; --danger: #f87171;
            --text: #e2e8f0; --muted: #64748b;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'IBM Plex Sans', sans-serif; background: var(--bg); color: var(--text); padding: 20px; }
        .hidden { display: none !important; }
        .container { max-width: 1000px; margin: 0 auto; }
        .panel { background: var(--panel); border: 1px solid var(--border); border-radius: 16px; padding: 24px; margin-bottom: 20px; }
        .panel-title { font-family: 'Orbitron', monospace; font-size: 14px; letter-spacing: 3px; color: var(--accent); margin-bottom: 16px; padding-bottom: 10px; border-bottom: 1px solid var(--border); }
        .btn { padding: 14px 24px; font-family: 'Orbitron', monospace; font-weight: 700; background: var(--accent); border: none; border-radius: 10px; cursor: pointer; margin-top: 16px; width: 100%; }
        .btn-danger { background: var(--danger); color: #fff; }
        .room-code { text-align: center; font-family: 'Orbitron', monospace; font-size: 52px; font-weight: 900; color: var(--gold); margin: 16px 0; }
        .scores-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 16px; margin-bottom: 20px; }
        .score-card { border-radius: 14px; padding: 20px; text-align: center; border: 2px solid var(--border); }
        .score-value { font-family: 'Orbitron', monospace; font-size: 36px; font-weight: 900; }
        .leaderboard { width: 100%; border-collapse: collapse; margin-top: 12px; }
        .leaderboard th, .leaderboard td { padding: 10px; text-align: center; border-bottom: 1px solid var(--border); }
        .text-success { color: var(--success); }
        .text-danger { color: var(--danger); }
    </style>
</head>
<body>
<div class="container">
    <div id="lobby-screen">
        <div class="panel">
            <div class="panel-title">PHONG CHO</div>
            <div class="room-code" id="room-id-display">- - - -</div>
            <p style="text-align: center; font-size: 20px;">So nguoi tham gia: <strong id="player-count-num">0</strong></p>
            <button class="btn" onclick="startGame()">BAT DAU TRO CHOI</button>
        </div>
    </div>

    <div id="game-screen" class="hidden">
        <div class="panel">
            <div style="display:flex; justify-content: space-between; align-items:center; margin-bottom: 20px;">
                <div style="font-family:'Orbitron', monospace; font-size:20px;" id="stage-title">Vong 1</div>
                <div style="font-family:'Orbitron', monospace; font-size:40px; color:var(--danger)" id="timer">60</div>
            </div>
            
            <div class="scores-row" id="scores-container">
                <div class="score-card"><div style="color:var(--team-a)">DOI A</div><div class="score-value" id="score-a">0</div></div>
                <div class="score-card"><div style="color:var(--team-b)">DOI B</div><div class="score-value" id="score-b">0</div></div>
            </div>

            <table class="leaderboard" id="realtime-leaderboard">
                <thead><tr><th>Ten</th><th>Doi</th><th>Diem</th><th>Hanh Dong Truoc</th><th>Tg Hoan Thanh Cau</th><th>Tong Thoi Gian</th></tr></thead>
                <tbody id="leaderboard-body"></tbody>
            </table>
        </div>
    </div>

    <div id="essay-screen" class="hidden">
        <div class="panel text-center">
            <h2 style="color:var(--accent); font-family: 'Orbitron', monospace; text-align:center;">VONG TU LUAN (DOI C)</h2>
            <p id="essay-status" style="text-align:center; margin-top: 20px; font-size: 18px;">Dang cho Doi C dat cau hoi...</p>
            <div id="essay-answers-log" style="margin-top: 20px;"></div>
        </div>
    </div>

    <div id="final-screen" class="hidden">
        <div class="panel" style="text-align: center;">
            <div class="panel-title">KET QUA CHUNG CUOC</div>
            <div id="victory-screen"></div>
            <button id="btnResetRoom" class="btn btn-danger" style="max-width: 300px; margin: 20px auto;">RESET KHOI DONG LAI GAME</button>
        </div>
    </div>
</div>

<script>
const socket = io();
let currentRoomId = '';

socket.emit('adminCreateRoom');
socket.on('roomCreated', (roomId) => {
    currentRoomId = roomId;
    document.getElementById('room-id-display').innerText = roomId;
});

socket.on('updatePlayerList', (players) => {
    document.getElementById('player-count-num').innerText = players.length;
});

function startGame() {
    if (!currentRoomId) return alert('Chua co phong!');
    if (confirm('Bat dau tro choi?')) socket.emit('adminStartGame', currentRoomId);
}

socket.on('gameStarted', () => {
    document.getElementById('lobby-screen').classList.add('hidden');
    document.getElementById('game-screen').classList.remove('hidden');
});

socket.on('stageUpdate', (data) => {
    document.getElementById('stage-title').innerText = `Vong ${data.stageNum} / 10 ` + (data.isDouble ? '(X2 DIEM)' : '');
    document.getElementById('score-a').innerText = data.teamA_score || 0;
    document.getElementById('score-b').innerText = data.teamB_score || 0;
    
    if (data.teamC_score !== undefined && !document.getElementById('score-c')) {
        const container = document.getElementById('scores-container');
        container.innerHTML += `<div class="score-card"><div style="color:var(--team-c)">DOI C</div><div class="score-value" id="score-c">${data.teamC_score}</div></div>`;
    } else if (document.getElementById('score-c')) {
        document.getElementById('score-c').innerText = data.teamC_score;
    }
    updateLeaderboardTable(data.players);
});

socket.on('timerUpdate', (seconds) => {
    document.getElementById('timer').innerText = seconds;
});

socket.on('playerSubmittedUpdate', (data) => {
    document.getElementById('score-a').innerText = data.teamA_score;
    document.getElementById('score-b').innerText = data.teamB_score;
    if(document.getElementById('score-c')) document.getElementById('score-c').innerText = data.teamC_score;
    
    const row = document.getElementById(`row-${data.id}`);
    if (row) {
        let dClass = data.lastDelta > 0 ? 'text-success' : 'text-danger';
        let dText = data.lastDelta > 0 ? `+${data.lastDelta}` : data.lastDelta;
        row.querySelector('.td-score').innerText = data.score;
        row.querySelector('.td-delta').innerHTML = `<span class="${dClass}">${dText}</span>`;
        row.querySelector('.td-last-time').innerText = `${data.lastCompletionTime}s`;
    }
});

socket.on('intermissionStart', (data) => {
    document.getElementById('stage-title').innerText = 'GIAI LAO';
    updateLeaderboardTable(data.leaderboard);
});

socket.on('essayRoundStart', () => {
    document.getElementById('game-screen').classList.add('hidden');
    document.getElementById('essay-screen').classList.remove('hidden');
});

socket.on('essayRoundBroadcastQuestion', (data) => {
    document.getElementById('essay-status').innerHTML = `Cau hoi tu Doi C: <strong style="color:var(--accent)">${data.questionText}</strong>`;
});

socket.on('essayRoundNewAnswer', (data) => {
    document.getElementById('essay-answers-log').innerHTML += `<div style="padding: 10px; border-bottom: 1px dashed var(--border);"><strong>${data.name} (Doi ${data.team}):</strong> ${data.answerText}</div>`;
});

socket.on('gameOver', (data) => {
    document.getElementById('game-screen').classList.add('hidden');
    document.getElementById('essay-screen').classList.add('hidden');
    document.getElementById('final-screen').classList.remove('hidden');
    
    let bonus = data.essayBonusDetails ? `<p style="color:var(--success); margin-top:10px;">${data.essayBonusDetails.winnerName} doat them ${data.essayBonusDetails.bonusPoints} diem tu Doi C!</p>` : '';
    document.getElementById('victory-screen').innerHTML = `
        <h2 style="font-size:30px; color:var(--gold);">${data.winningTeam === 'HOA' ? 'HOA NHAU' : 'DOI CHIEN THANG: DOI ' + data.winningTeam}</h2>
        <p style="font-size: 20px; margin-top:15px;">Doi A: <strong>${data.scoreA}</strong> | Doi B: <strong>${data.scoreB}</strong></p>
        ${bonus}
    `;
});

document.getElementById('btnResetRoom').addEventListener('click', () => {
    socket.emit('resetGame', currentRoomId);
    window.location.reload();
});

function updateLeaderboardTable(players) {
    const tbody = document.getElementById('leaderboard-body');
    tbody.innerHTML = '';
    // Sắp xếp lại
    let sorted = [...players].sort((a,b) => b.score - a.score || a.totalCompletionTime - b.totalCompletionTime);
    sorted.forEach(p => {
        let dClass = p.lastDelta > 0 ? 'text-success' : (p.lastDelta < 0 ? 'text-danger' : '');
        let dText = p.lastDelta > 0 ? `+${p.lastDelta}` : (p.lastDelta || '-');
        tbody.innerHTML += `
            <tr id="row-${p.id}">
                <td><strong>${p.name}</strong></td>
                <td>${p.team}</td>
                <td class="td-score"><strong>${p.score}</strong></td>
                <td class="td-delta"><span class="${dClass}">${dText}</span></td>
                <td class="td-last-time">${p.lastCompletionTime || 0}s</td>
                <td>${p.totalCompletionTime || 0}s</td>
            </tr>
        `;
    });
}
</script>
</body>
</html>
