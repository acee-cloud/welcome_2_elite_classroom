<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin – Bảng Điều Khiển</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=IBM+Plex+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        :root { --bg: #0b0f19; --panel: #141b2d; --border: #24324f; --accent: #00ff88; --team-a: #ff4a4a; --team-b: #00d2ff; }
        body { margin: 0; background: var(--bg); color: #fff; font-family: 'IBM Plex Sans', sans-serif; padding: 20px; }
        .grid-layout { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 20px; }
        .card { background: var(--panel); border: 2px solid var(--border); border-radius: 12px; padding: 20px; text-align: center; }
        .score-big { font-family: 'Orbitron'; font-size: 3.5rem; font-weight: 900; margin: 15px 0; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; text-align: left; }
        th, td { padding: 12px; border-bottom: 1px solid var(--border); }
        th { color: #94a3b8; }
        #qrcode { display: flex; justify-content: center; margin: 20px 0; padding: 10px; background: white; width: 180px; height: 180px; margin-left: auto; margin-right: auto; border-radius: 8px; }
        button { background: var(--accent); color: #000; font-weight: bold; border: none; padding: 12px 25px; border-radius: 6px; font-size: 1.1rem; cursor: pointer; }
    </style>
</head>
<body>

    <div id="lobby-view" class="card" style="max-width: 600px; margin: 40px auto;">
        <h2 style="font-family:'Orbitron'; color:var(--accent); margin-top:0;">KHỞI TẠO PHÒNG CHƠI</h2>
        <button id="btn-create" onclick="createRoom()">TẠO PHÒNG MỚI</button>
        
        <div id="room-info" style="display:none; margin-top:20px;">
            <div style="font-size: 1.2rem; color: #94a3b8;">MÃ PHÒNG TRUY CẬP</div>
            <div id="room-code-txt" style="font-family:'Orbitron'; font-size:4rem; font-weight:900; color:#fff; letter-spacing:4px; margin:10px 0;">----</div>
            
            <div id="qrcode"></div>
            <p style="color:#94a3b8; font-size:0.9rem;">📱 Người chơi quét mã QR ở trên hoặc truy cập liên kết để vào thẳng phòng</p>
            
            <div style="margin-top:20px;">
                <h3>Danh sách phòng chờ (<span id="player-count">0</span>):</h3>
                <div id="player-list" style="color:var(--accent); min-height:30px;">Chưa có ai tham gia...</div>
            </div>
            <button id="btn-start" onclick="startGame()" style="margin-top:25px; width:100%;">BẮT ĐẦU TRẬN ĐẤU</button>
        </div>
    </div>

    <div id="dashboard-view" style="display:none;">
        <div style="display:flex; justify-content:space-between; align-items:center; background:var(--panel); padding:15px; border-radius:12px; border:1px solid var(--border);">
            <h2 id="current-stage-txt" style="font-family:'Orbitron'; margin:0; color:var(--accent);">STAGE 1</h2>
            <h2 id="global-timer" style="font-family:'Orbitron'; margin:0; color:#ffaa00;">60s</h2>
        </div>

        <div class="grid-layout">
            <div class="card" style="border-color: var(--team-a);">
                <h3 style="color: var(--team-a); margin:0;">TỔNG ĐIỂM ĐỘI A</h3>
                <div class="score-big" id="score-a-view" style="color: var(--team-a);">0</div>
            </div>
            <div class="card" style="border-color: var(--team-b);">
                <h3 style="color: var(--team-b); margin:0;">TỔNG ĐIỂM ĐỘI B</h3>
                <div class="score-big" id="score-b-view" style="color: var(--team-b);">0</div>
            </div>
        </div>

        <div class="card" style="margin-top:20px; text-align:left;">
            <h3 style="margin-top:0; color:var(--accent); font-family:'Orbitron';">BẢNG XẾP HẠNG THỜI GIAN THỰC (REALTIME)</h3>
            <table>
                <thead>
                    <tr>
                        <th>Hạng</th>
                        <th>Họ và Tên</th>
                        <th>Đội</th>
                        <th>Điểm Số</th>
                    </tr>
                </thead>
                <tbody id="leaderboard-rows">
                    </tbody>
            </table>
        </div>
    </div>

    <script>
        const socket = io();
        let myRoomId = '';

        function createRoom() {
            socket.emit('adminCreateRoom');
            document.getElementById('btn-create').style.display = 'none';
        }

        // TỰ ĐỘNG XỬ LÝ VÀ HIỂN THỊ MÃ QR KHI KHỞI TẠO PHÒNG
        socket.on('roomCreated', (roomId) => {
            myRoomId = roomId;
            document.getElementById('room-info').style.display = 'block';
            document.getElementById('room-code-txt').innerText = roomId;

            // Xây dựng đường dẫn QR tự động điền phòng: http://domain/play?room=ABCD
            const fullPlayUrl = `${window.location.origin}/play?room=${roomId}`;
            
            document.getElementById('qrcode').innerHTML = ''; // Clear QR cũ
            new QRCode(document.getElementById('qrcode'), {
                text: fullPlayUrl,
                width: 180,
                height: 180,
                colorDark : "#000000",
                colorLight : "#ffffff",
                correctLevel : QRCode.CorrectLevel.H
            });
        });

        socket.on('updatePlayerList', (players) => {
            document.getElementById('player-count').innerText = players.length;
            if(players.length === 0) {
                document.getElementById('player-list').innerText = "Chưa có ai tham gia...";
                return;
            }
            document.getElementById('player-list').innerText = players.map(p => p.name).join(', ');
        });

        function startGame() {
            socket.emit('adminStartGame', myRoomId);
        }

        socket.on('gameStarted', () => {
            document.getElementById('lobby-view').style.display = 'none';
            document.getElementById('dashboard-view').style.display = 'block';
        });

        socket.on('stageUpdate', (data) => {
            document.getElementById('current-stage-txt').innerText = `STAGE ${data.stageNum} ${data.isDouble ? ' - (X2 ĐIỂM)' : ''}`;
        });

        socket.on('timerUpdate', (timeLeft) => {
            document.getElementById('global-timer').innerText = timeLeft + 's';
        });

        // ĐÓN NHẬN ĐIỂM SỐ REALTIME THEO TỪNG CÂU HỎI TỪ SERVER
        socket.on('realtimeScoreUpdate', (data) => {
            document.getElementById('score-a-view').innerText = data.scoreA;
            document.getElementById('score-b-view').innerText = data.scoreB;

            const tbody = document.getElementById('leaderboard-rows');
            tbody.innerHTML = '';
            data.players.forEach((p, idx) => {
                const teamColor = p.team === 'A' ? 'var(--team-a)' : 'var(--team-b)';
                tbody.innerHTML += `
                    <tr>
                        <td><strong>${idx + 1}</strong></td>
                        <td>${p.name}</td>
                        <td style="color:${teamColor}; font-weight:bold;">Đội ${p.team || 'Solo'}</td>
                        <td style="color:var(--accent); font-weight:bold;">${p.score}đ</td>
                    </tr>
                `;
            });
        });

        socket.on('intermissionStart', () => {
            document.getElementById('current-stage-txt').innerText = "ĐANG TRONG PHÒNG NGHỈ GIẢI LAO";
        });
    </script>
</body>
</html>
