<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin – Bảng Điều Khiển Realtime</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=IBM+Plex+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        :root {
            --bg: #0b0f19;
            --panel: #141b2d;
            --border: #24324f;
            --accent: #00ff88;
            --team-a: #ff4a4a;
            --team-b: #00d2ff;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            background: var(--bg);
            color: #fff;
            font-family: 'IBM Plex Sans', sans-serif;
            padding: 20px;
            min-height: 100vh;
        }

        .card {
            background: var(--panel);
            border: 2px solid var(--border);
            border-radius: 12px;
            padding: 20px;
            text-align: center;
        }

        /* ===================== LOBBY / QR VIEW ===================== */
        #setup-view {
            max-width: 1000px;
            margin: 40px auto;
        }

        #btn-create, #btn-start {
            background: var(--accent);
            color: #000;
            font-family: 'Orbitron', sans-serif;
            font-weight: 900;
            border: none;
            padding: 15px 30px;
            border-radius: 8px;
            font-size: 1.2rem;
            cursor: pointer;
            transition: 0.2s;
            text-transform: uppercase;
        }
        
        #btn-create:hover, #btn-start:hover { 
            opacity: 0.9; 
            transform: scale(1.05); 
        }

        #btn-start {
            background: linear-gradient(135deg, #00ff88, #00cc6a);
            margin-top: 20px;
            width: 100%;
        }

        /* Layout 3 cột cho màn hình QR */
        .lobby-grid {
            display: grid;
            grid-template-columns: 1fr 1.2fr 1fr;
            gap: 20px;
            margin-top: 20px;
        }

        .team-panel {
            background: rgba(255,255,255,0.02);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 15px;
            max-height: 400px;
            overflow-y: auto;
        }

        .team-panel h3 {
            font-family: 'Orbitron';
            margin-top: 0;
            padding-bottom: 10px;
            border-bottom: 1px dashed var(--border);
        }

        .team-a-title { color: var(--team-a); }
        .team-b-title { color: var(--team-b); }

        .member-item {
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(255,255,255,0.05);
            padding: 8px 12px;
            border-radius: 6px;
            margin-bottom: 8px;
            font-size: 0.9rem;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateX(-10px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .qr-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        #qrcode {
            background: white;
            padding: 15px;
            border-radius: 10px;
            margin: 15px 0;
        }

        #room-code-txt {
            font-family: 'Orbitron';
            font-size: 3.5rem;
            font-weight: 900;
            color: var(--accent);
            letter-spacing: 5px;
            margin: 10px 0;
        }

        /* ===================== DASHBOARD VIEW ===================== */
        .score-big {
            font-family: 'Orbitron';
            font-size: 4rem;
            font-weight: 900;
            margin: 15px 0;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
        }

        .dashboard-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-top: 20px;
        }

        table { width: 100%; border-collapse: collapse; margin-top: 15px; text-align: left; }
        th, td { padding: 12px; border-bottom: 1px solid var(--border); }
        th { color: #94a3b8; text-transform: uppercase; font-size: 0.85rem; }

        /* Hiển thị thay đổi điểm (+-) */
        .delta-badge { 
            font-size: 0.9rem; 
            padding: 3px 8px; 
            border-radius: 4px; 
            margin-left: 8px; 
            font-weight: bold;
            animation: pop 0.4s ease;
        }
        .delta-plus { background: rgba(0, 255, 136, 0.2); color: #00ff88; }
        .delta-minus { background: rgba(255, 74, 74, 0.2); color: #ff4a4a; }

        .team-delta {
            font-size: 1.5rem;
            font-weight: 700;
            font-family: 'IBM Plex Sans';
        }

        @keyframes pop {
            0% { transform: scale(0.5); opacity: 0; }
            50% { transform: scale(1.2); }
            100% { transform: scale(1); opacity: 1; }
        }
    </style>
</head>
<body>

    <!-- ========== MÀN HÌNH KHỞI TẠO & QR (GỘP SẢNH CHỜ) ========== -->
    <div id="setup-view" class="card">
        <div id="init-btn-zone">
            <h2 style="font-family:'Orbitron'; color:var(--accent);">HỆ THỐNG QUẢN TRỊ GAME</h2>
            <button id="btn-create" onclick="createRoom()">TẠO PHÒNG MỚI</button>
        </div>

        <div id="room-active" style="display: none;">
            <div class="lobby-grid">
                <!-- ĐỘI A -->
                <div class="team-panel">
                    <h3 class="team-a-title">⚔ ĐỘI A (<span id="count-a">0</span>)</h3>
                    <div id="list-a"></div>
                </div>

                <!-- KHU VỰC QR -->
                <div class="qr-section">
                    <div style="font-size: 1.1rem; color: #94a3b8; text-transform: uppercase;">Mã phòng của bạn</div>
                    <div id="room-code-txt">----</div>
                    <div id="qrcode"></div>
                    <div style="color: #94a3b8; font-size: 0.9rem; margin-bottom: 10px;">
                        Quét mã để tham gia. Tổng người chơi: <strong style="color: var(--accent);" id="total-players">0</strong>
                    </div>
                </div>

                <!-- ĐỘI B -->
                <div class="team-panel">
                    <h3 class="team-b-title">🛡 ĐỘI B (<span id="count-b">0</span>)</h3>
                    <div id="list-b"></div>
                </div>
            </div>
            
            <button id="btn-start" onclick="startGame()">BẮT ĐẦU TRẬN ĐẤU</button>
        </div>
    </div>

    <!-- ========== MÀN HÌNH GAME (DASHBOARD) ========== -->
    <div id="dashboard-view" style="display:none;">
        <div style="display:flex; justify-content:space-between; align-items:center; background:var(--panel); padding:15px; border-radius:12px; border:1px solid var(--border);">
            <h2 id="current-stage-txt" style="font-family:'Orbitron'; margin:0; color:var(--accent);">ĐANG TRONG TRẬN ĐẤU</h2>
            <h2 id="global-timer" style="font-family:'Orbitron'; margin:0; color:#ffaa00;">--</h2>
        </div>

        <div class="dashboard-grid">
            <div class="card" style="border-color: var(--team-a);">
                <h3 style="color: var(--team-a); margin:0;">ĐIỂM TRUNG BÌNH ĐỘI A</h3>
                <div class="score-big" style="color: var(--team-a);">
                    <span id="score-a-view">0</span>
                    <span id="delta-a-view" class="team-delta"></span>
                </div>
            </div>
            <div class="card" style="border-color: var(--team-b);">
                <h3 style="color: var(--team-b); margin:0;">ĐIỂM TRUNG BÌNH ĐỘI B</h3>
                <div class="score-big" style="color: var(--team-b);">
                    <span id="score-b-view">0</span>
                    <span id="delta-b-view" class="team-delta"></span>
                </div>
            </div>
        </div>

        <div class="card" style="margin-top:20px; text-align:left;">
            <h3 style="margin-top:0; color:var(--accent); font-family:'Orbitron';">BẢNG XẾP HẠNG CÁ NHÂN</h3>
            <table>
                <thead>
                    <tr>
                        <th>Hạng</th>
                        <th>Họ và Tên</th>
                        <th>Đội</th>
                        <th>Điểm Số (Cá Nhân)</th>
                        <th>Tốc độ TB</th>
                    </tr>
                </thead>
                <tbody id="leaderboard-rows"></tbody>
            </table>
        </div>

        <div id="reset-zone" style="margin-top:30px; text-align:center; display:none;">
            <button onclick="resetGame()" style="background:#ff4a4a; color:#fff; padding: 12px 24px; border:none; border-radius: 6px; font-weight: bold; cursor:pointer;">LÀM MỚI GAME</button>
        </div>
    </div>

    <script>
    const socket = io();
    let myRoomId = '';

    // ==========================================
    // 1. TẠO PHÒNG & HIỂN THỊ QR
    // ==========================================
    function createRoom() {
        socket.emit('adminCreateRoom');
        document.getElementById('init-btn-zone').style.display = 'none';
        document.getElementById('room-active').style.display = 'block';
    }

    socket.on('roomCreated', (roomId) => {
        myRoomId = roomId;
        document.getElementById('room-code-txt').innerText = roomId;
        
        const fullPlayUrl = `${window.location.origin}/play?room=${roomId}`;
        document.getElementById('qrcode').innerHTML = '';
        new QRCode(document.getElementById('qrcode'), {
            text: fullPlayUrl,
            width: 200,
            height: 200,
            colorDark: "#000000",
            colorLight: "#ffffff",
            correctLevel: QRCode.CorrectLevel.H
        });
    });

    // ==========================================
    // 2. CẬP NHẬT DANH SÁCH TEAM Ở MÀN HÌNH QR
    // ==========================================
    socket.on('updatePlayerList', (players) => {
        const teamA = players.filter(p => p.team === 'A');
        const teamB = players.filter(p => p.team === 'B');

        document.getElementById('total-players').innerText = players.length;
        document.getElementById('count-a').innerText = teamA.length;
        document.getElementById('count-b').innerText = teamB.length;

        renderTeamList('list-a', teamA);
        renderTeamList('list-b', teamB);
    });

    function renderTeamList(containerId, members) {
        const container = document.getElementById(containerId);
        container.innerHTML = '';
        if (members.length === 0) {
            container.innerHTML = '<div style="color:#475569; text-align:center; margin-top:20px;">Chưa có thành viên</div>';
            return;
        }
        members.forEach(p => {
            const el = document.createElement('div');
            el.className = 'member-item';
            el.innerHTML = `<span style="font-size:1.5rem;">${p.avatar || '👤'}</span> <strong>${p.name}</strong>`;
            container.appendChild(el);
        });
    }

    // ==========================================
    // 3. BẮT ĐẦU GAME
    // ==========================================
    function startGame() {
        if(confirm("Bạn muốn chốt danh sách và bắt đầu ngay?")) {
            socket.emit('adminStartGame', myRoomId);
        }
    }

    socket.on('gameStarted', () => {
        document.getElementById('setup-view').style.display = 'none';
        document.getElementById('dashboard-view').style.display = 'block';
    });

    // ==========================================
    // 4. CẬP NHẬT ĐIỂM SỐ THEO THỜI GIAN THỰC
    // ==========================================
    socket.on('realtimeScoreUpdate', (data) => {
        // Cập nhật điểm trung bình của Đội (Làm tròn 1 chữ số thập phân nếu cần)
        updateTeamScore('a', data.scoreA, data.teamDeltaA);
        updateTeamScore('b', data.scoreB, data.teamDeltaB);

        // Cập nhật Bảng xếp hạng cá nhân
        const tbody = document.getElementById('leaderboard-rows');
        tbody.innerHTML = '';
        
        data.players.forEach((p, idx) => {
            let teamColor = p.team === 'A' ? 'var(--team-a)' : 'var(--team-b)';
            
            // Xử lý huy hiệu (+-) cho cá nhân
            let deltaHtml = '';
            if (p.lastDelta > 0)  deltaHtml = `<span class="delta-badge delta-plus">+${p.lastDelta}</span>`;
            if (p.lastDelta < 0)  deltaHtml = `<span class="delta-badge delta-minus">${p.lastDelta}</span>`;

            tbody.innerHTML += `
                <tr>
                    <td><strong>#${idx + 1}</strong></td>
                    <td><span style="font-size:1.2rem; margin-right:8px;">${p.avatar || '👤'}</span> ${p.name}</td>
                    <td style="color:${teamColor}; font-weight:bold;">ĐỘI ${p.team}</td>
                    <td style="font-weight:bold; font-size: 1.1rem;">${p.score} ${deltaHtml}</td>
                    <td style="color:#94a3b8;">${(p.totalTimeTaken || 0).toFixed(1)}s</td>
                </tr>`;
        });
    });

    // Hàm hiển thị điểm Đội kèm theo hiệu ứng (+-)
    function updateTeamScore(team, newScore, delta) {
        document.getElementById(`score-${team}-view`).innerText = parseFloat(newScore).toFixed(1); // Hiển thị số thập phân cho điểm trung bình
        
        const deltaEl = document.getElementById(`delta-${team}-view`);
        if (delta && delta !== 0) {
            deltaEl.innerText = delta > 0 ? `+${parseFloat(delta).toFixed(1)}` : parseFloat(delta).toFixed(1);
            deltaEl.className = 'team-delta ' + (delta > 0 ? 'delta-plus' : 'delta-minus');
            
            // Tự động ẩn (+-) sau 3 giây
            setTimeout(() => { deltaEl.innerText = ''; deltaEl.className = 'team-delta'; }, 3000);
        }
    }

    // ==========================================
    // 5. CÁC EVENT KHÁC CỦA TRẬN ĐẤU
    // ==========================================
    socket.on('stageUpdate', (data) => {
        document.getElementById('current-stage-txt').innerText = `VÒNG ${data.stageNum}`;
    });

    socket.on('timerUpdate', (timeLeft) => {
        document.getElementById('global-timer').innerText = timeLeft + 's';
    });

    socket.on('gameOver', () => {
        document.getElementById('current-stage-txt').innerText = "TRÒ CHƠI KẾT THÚC";
        document.getElementById('global-timer').innerText = "END";
        document.getElementById('reset-zone').style.display = 'block';
    });

    function resetGame() {
        if (confirm("Reset lại từ đầu?")) socket.emit('adminResetGame', myRoomId);
    }

    socket.on('roomResetByAdmin', () => window.location.reload());
    </script>
</body>
</html>
