<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Bảng Điều Khiển Admin - Giáo Viên</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        :root { --bg: #060b19; --cyan: #00f0ff; --blue: #0066ff; --surface: #101f42; }
        body { background: var(--bg); color: #fff; font-family: sans-serif; text-align: center; padding: 20px; }
        .box { background: var(--surface); border: 2px solid var(--cyan); border-radius: 8px; padding: 20px; max-width: 800px; margin: 20px auto; box-shadow: 0 0 15px var(--blue); }
        .btn { background: linear-gradient(45deg, var(--blue), var(--cyan)); border: none; padding: 12px 30px; color: #000; font-weight: bold; border-radius: 4px; cursor: pointer; font-size: 1.1rem; text-transform: uppercase; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; text-align: left; margin-top: 20px; }
        .team-panel { background: #0c1630; padding: 15px; border-radius: 6px; border: 1px solid var(--blue); }
        .status-done { color: #00ff66; font-weight: bold; }
        .status-doing { color: #ffcc00; }
    </style>
</head>
<body>
    <div class="box">
        <h1>HỆ THỐNG QUẢN TRÒ VẬT LÍ 11</h1>
        <p>Chiếu màn hình này lên Tivi/Máy chiếu của lớp học</p>
        <button class="btn" onclick="startGame()">Khóa Phòng & Phát Động Trận Đấu</button>
    </div>

    <div class="box">
        <h2>Trạng Thái Lớp Học & Tiến Độ Đội Nhóm</h2>
        <div class="grid">
            <div class="team-panel">
                <h3 style="color: var(--cyan);">TỔ ĐỘI A</h3>
                <div id="team-A-list">Chưa có người chơi...</div>
            </div>
            <div class="team-panel">
                <h3 style="color: #ff00ff;">TỔ ĐỘI B</h3>
                <div id="team-B-list">Chưa có người chơi...</div>
            </div>
        </div>
    </div>

    <script>
        const socket = io();
        function startGame() { socket.emit('admin_start_game'); }

        socket.on('update_players', (players) => {
            const listA = document.getElementById('team-A-list');
            const listB = document.getElementById('team-B-list');
            listA.innerHTML = ''; listB.innerHTML = '';

            players.forEach(p => {
                let status = p.doneCurrentStage ? '<span class="status-done">[ĐÃ XONG]</span>' : '<span class="status-doing">[ĐANG LÀM...]</span>';
                let item = `<div style="margin-bottom:8px;">${p.avatar} <b>${p.name}</b> - Điểm: ${p.score}đ ${p.team ? status : ''}</div>`;
                
                if(p.team === 'A') listA.innerHTML += item;
                else if(p.team === 'B') listB.innerHTML += item;
                else { listA.innerHTML += `<div>${p.avatar} ${p.name} (Đang ở sảnh chờ)</div>`; }
            });
        });

        socket.on('intermission_30s', (data) => {
            alert(`Cửa đấu kết thúc! Toàn bộ học sinh đã hoàn thành. Quỹ điểm gián điệp tích lũy hiện tại: ${data.spyPointsHidden}đ`);
        });
        socket.on('error_message', (msg) => alert(msg));
    </script>
</body>
</html>
