<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Bang Dieu Khien Realtime</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=IBM+Plex+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="/socket.io/socket.io.js"></script>
    <style>
        :root {
            --bg: #0a0e1a; --panel: #111827; --border: #1e3a5f;
            --accent: #00d4ff; --team-a: #ff4d6d; --team-b: #38bdf8; --team-c: #a78bfa;
            --gold: #ffd700; --success: #34d399; --danger: #f87171;
            --text: #e2e8f0; --muted: #64748b;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'IBM Plex Sans', sans-serif; background: var(--bg); color: var(--text); padding: 20px; }
        .hidden { display: none !important; }
        .container { max-width: 1100px; margin: 0 auto; }
        .panel { background: var(--panel); border: 1px solid var(--border); border-radius: 16px; padding: 24px; margin-bottom: 20px; }
        .panel-title { font-family: 'Orbitron', monospace; font-size: 14px; letter-spacing: 3px; color: var(--accent); margin-bottom: 16px; padding-bottom: 10px; border-bottom: 1px solid var(--border); }
        .btn { padding: 14px 24px; font-family: 'Orbitron', monospace; font-weight: 700; background: var(--accent); border: none; border-radius: 10px; cursor: pointer; margin-top: 16px; width: 100%; color: #000; }
        .btn-danger { background: var(--danger); color: #fff; }
        .room-code { text-align: center; font-family: 'Orbitron', monospace; font-size: 52px; font-weight: 900; color: var(--gold); margin: 16px 0; }
        .scores-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 16px; margin-bottom: 20px; }
        .score-card { border-radius: 14px; padding: 20px; text-align: center; border: 2px solid var(--border); background: rgba(0,0,0,0.2); }
        .score-value { font-family: 'Orbitron', monospace; font-size: 36px; font-weight: 900; }
        
        .leaderboard { width: 100%; border-collapse: collapse; margin-top: 12px; }
        .leaderboard th { padding: 12px; font-weight: 600; color: var(--muted); text-transform: uppercase; font-size: 13px; border-bottom: 2px solid var(--border); }
        .leaderboard td { padding: 14px 12px; text-align: center; border-bottom: 1px solid var(--border); font-size: 15px; transition: all 0.2s ease; }
        .leaderboard tr:hover { background: rgba(255,255,255,0.02); }
        
        .text-success { color: var(--success); font-weight: bold; }
        .text-danger { color: var(--danger); font-weight: bold; }
        
        .badge-team { padding: 4px 10px; border-radius: 6px; font-size: 12px; font-weight: bold; display: inline-block; }
        .b-team-A { background: rgba(255,77,109,0.15); color: var(--team-a); border: 1px solid var(--team-a); }
        .b-team-B { background: rgba(56,189,248,0.15); color: var(--team-b); border: 1px solid var(--team-b); }
        .b-team-C { background: rgba(167,139,250,0.15); color: var(--team-c); border: 1px solid var(--team-c); }
        .b-team-SOLO { background: rgba(255,215,0,0.15); color: var(--gold); border: 1px solid var(--gold); }
        
        .flash-update { animation: highlight 0.8s ease-out; }
        @keyframes highlight {
            0% { background: rgba(0, 212, 255, 0.2); }
            100% { background: transparent; }
        }
    </style>
</head>
<body>
<div class="container">
    <div id="lobby-screen">
        <div class="panel">
            <div class="panel-title">PHONG CHO HE THONG</div>
            <div class="room-code" id="room-id-display">- - - -</div>
            <p style="text-align: center; font-size: 20px; margin-bottom: 10px;">So nguoi da tham gia: <strong id="player-count-num" style="color: var(--accent);">0</strong></p>
            <p style="text-align: center; color: var(--muted); font-size: 14px;" id="qr-suggest-link"></p>
            <button class="btn" onclick="startGame()">BAT DAU TRO CHOI</button>
        </div>
    </div>

    <div id="game-screen" class="hidden">
        <div class="panel">
            <div style="display:flex; justify-content: space-between; align-items:center; margin-bottom: 20px;">
                <div style="font-family:'Orbitron', monospace; font-size:22px; font-weight: 900;" id="stage-title">Vong 1</div>
                <div style="font-family:'Orbitron', monospace; font-size:44px; font-weight: 900; color:var(--danger)" id="timer">60</div>
            </div>
            
            <div class="scores-row" id="scores-container">
                <div class="score-card"><div style="color:var(--team-a); font-weight: bold;">TONG DOI A</div><div class="score-value" id="score-a">0</div></div>
                <div class="score-card"><div style="color:var(--team-b); font-weight: bold;">TONG DOI B</div><div class="score-value" id="score-b">0</div></div>
            </div>

            <div class="panel-title" style="margin-top: 30px;">BANG XEP HANG REALTIME (NHAY DIEM LIEN TUC)</div>
            <table class="leaderboard">
                <thead>
                    <tr>
                        <th style="width: 80px;">Hang</th>
                        <th>Ten Nguoi Choi</th>
                        <th>Doi</th>
                        <th>Tong Diem</th>
                        <th>Bien Dong Gần Nhất</th>
                        <th>Tg Cau Vua Qua</th>
                        <th>Tong Tg Lam Bai</th>
                    </tr>
                </thead>
                <tbody id="leaderboard-body"></tbody>
            </table>
        </div>
    </div>

    <div id="essay-screen" class="hidden">
        <div class="panel">
            <h2 style="color:var(--accent); font-family: 'Orbitron', monospace; text-align:center; letter-spacing: 2px;">VONG TU LUAN NHANH</h2>
            <p id="essay-status" style="text-align:center; margin-top: 20px; font-size: 18px; color: var(--gold);">Dang cho thanh vien Doi C soan cau hoi...</p>
            <div id="essay-answers-log" style="margin-top: 35px; background: rgba(0,0,0,0.2); border-radius: 10px; padding: 10px;"></div>
        </div>
    </div>

    <div id="final-screen" class="hidden">
        <div class="panel" style="text-align: center;">
            <div class="panel-title">TONG KET TRAN DAU</div>
            <div id="victory-screen" style="margin: 30px 0;"></div>
            <button id="btnResetRoom" class="btn btn-danger" style="max-width: 400px; margin: 20px auto display: block;">RESET & BAT DAU PHONG MOI</button>
        </div>
    </div>
</div>

<script>
const socket = io();
let currentRoomId = '';
let adminPlayers = []; // Lưu trữ trạng thái người chơi cục bộ để nhảy điểm liên tục

socket.emit('adminCreateRoom');
socket.on('roomCreated', (roomId) => {
    currentRoomId = roomId;
    document.getElementById('room-id-display').innerText = roomId;
    
    // Gợi ý đường dẫn quét mã QR
    const joinLink = `${window.location.origin}/play?room=${roomId}`;
    document.getElementById('qr-suggest-link').innerText = `Link quet QR: ${joinLink}`;
});

socket.on('updatePlayerList', (players) => {
    document.getElementById('player-count-num').innerText = players.length;
    adminPlayers = players;
});

function startGame() {
    if (!currentRoomId) return alert('He thong chua khoi tao xong phong!');
    if (adminPlayers.length === 0) return alert('Chua co nguoi choi nao tham gia phong!');
    if (confirm('Xac nhan khoa phong va bat dau vong 1?')) {
        socket.emit('adminStartGame', currentRoomId);
    }
}

socket.on('gameStarted', () => {
    document.getElementById('lobby-screen').classList.add('hidden');
    document.getElementById('game-screen').classList.remove('hidden');
});

socket.on('stageUpdate', (data) => {
    document.getElementById('stage-title').innerText = `Vong ${data.stageNum} / 10 ` + (data.isDouble ? '(X2 DIEM DUY NHAT)' : '');
    document.getElementById('score-a').innerText = data.teamA_score || 0;
    document.getElementById('score-b').innerText = data.teamB_score || 0;
    
    // Đồng bộ danh sách người chơi đầu vòng đấu
    adminPlayers = data.players;
    
    // Xử lý hiển thị thẻ điểm Đội C nếu có xuất hiện
    if (data.teamC_score !== undefined && data.teamC_score >= 0) {
        if (!document.getElementById('score-c-card')) {
            const container = document.getElementById('scores-container');
            container.innerHTML += `
                <div class="score-card" id="score-c-card">
                    <div style="color:var(--team-c); font-weight: bold;">DIEM DOI C (LE)</div>
                    <div class="score-value" id="score-c">${data.teamC_score}</div>
                </div>`;
        } else {
            document.getElementById('score-c').innerText = data.teamC_score;
        }
    }
    renderLeaderboard(false);
});

socket.on('timerUpdate', (seconds) => {
    document.getElementById('timer').innerText = seconds;
});

// KHI CO NGUOI CHOI TRA LOI XONG 1 CAU - DIEM NHAY LIEN TUC
socket.on('playerSubmittedUpdate', (data) => {
    // Cập nhật tổng điểm các đội nhanh
    document.getElementById('score-a').innerText = data.teamA_score;
    document.getElementById('score-b').innerText = data.teamB_score;
    if (document.getElementById('score-c')) {
        document.getElementById('score-c').innerText = data.teamC_score;
    }
    
    // Tìm và cập nhật dữ liệu realtime của người chơi đó trong mảng cục bộ cục bộ
    let p = adminPlayers.find(pl => pl.id === data.id);
    if (p) {
        p.score = data.score;
        p.lastDelta = data.lastDelta;
        p.lastCompletionTime = data.lastCompletionTime;
        p.totalCompletionTime += data.lastCompletionTime; // Tích lũy tổng thời gian
        p.isUpdated = data.id; // Đánh dấu hiệu ứng flash dòng vừa đổi điểm
    }
    
    // Sắp xếp và vẽ lại BXH ngay lập tức để tạo hiệu ứng nhảy hạng/điểm liên tục
    renderLeaderboard(true);
});

socket.on('intermissionStart', (data) => {
    document.getElementById('stage-title').innerText = 'THOI GIAN NGHI GIUA VONG';
    adminPlayers = data.leaderboard;
    renderLeaderboard(false);
});

socket.on('essayRoundStart', () => {
    document.getElementById('game-screen').classList.add('hidden');
    document.getElementById('essay-screen').classList.remove('hidden');
});

socket.on('essayRoundBroadcastQuestion', (data) => {
    document.getElementById('essay-status').innerHTML = `Cau hoi tu Nguoi le (Doi C) <strong>${data.creatorName}</strong>:<br><br><span style="color:var(--accent); font-size:24px;">"${data.questionText}"</span>`;
});

socket.on('essayRoundNewAnswer', (data) => {
    const log = document.getElementById('essay-answers-log');
    log.innerHTML += `
        <div style="padding: 12px; border-bottom: 1px dashed var(--border); font-size:15px;">
            <span class="badge-team b-team-${data.team}">Doi ${data.team}</span> 
            <strong>${data.name}:</strong> <span style="color:#fff;">${data.answerText}</span>
        </div>`;
});

socket.on('gameOver', (data) => {
    document.getElementById('game-screen').classList.add('hidden');
    document.getElementById('essay-screen').classList.add('hidden');
    document.getElementById('final-screen').classList.remove('hidden');
    
    let winHtml = data.winningTeam === 'HOA' 
        ? `<h2 style="font-size:36px; color:var(--gold); font-family:'Orbitron';">KET QUA: HOA NHAU!</h2>` 
        : `<h2 style="font-size:36px; color:var(--accent); font-family:'Orbitron';">DOI CHIEN THANG: DOI ${data.winningTeam}</h2>`;
        
    let bonusHtml = data.essayBonusDetails 
        ? `<p style="color:var(--success); font-size:18px; margin-top:15px;">Dac biet: Nguoi choi <strong>${data.essayBonusDetails.winnerName}</strong> (Doi ${data.essayBonusDetails.winningTeam}) da nhanh nhat va chiem tron toàn bo <strong>${data.essayBonusDetails.bonusPoints} diem</strong> cua Nguoi le!</p>` 
        : '';
        
    document.getElementById('victory-screen').innerHTML = `
        ${winHtml}
        <div style="margin: 25px 0; font-size: 22px;">
            Doi A: <strong style="color:var(--team-a)">${data.scoreA}</strong> | Doi B: <strong style="color:var(--team-b)">${data.scoreB}</strong>
        </div>
        ${bonusHtml}
    `;
});

document.getElementById('btnResetRoom').addEventListener('click', () => {
    if (confirm('Ban co chac chan muon xoa phong cu, reset toan bo de bat dau lai phong moi?')) {
        socket.emit('resetGame', currentRoomId);
        window.location.reload();
    }
});

function renderLeaderboard(hasFlashEffect) {
    const tbody = document.getElementById('leaderboard-body');
    tbody.innerHTML = '';
    
    // Quy tắc xếp hạng: Điểm cao xếp trên, nếu bằng điểm ai có Tổng thời gian hoàn thành nhỏ hơn (nhanh hơn) xếp trên
    adminPlayers.sort((a, b) => b.score - a.score || a.totalCompletionTime - b.totalCompletionTime);
    
    adminPlayers.forEach((p, idx) => {
        let dClass = p.lastDelta > 0 ? 'text-success' : (p.lastDelta < 0 ? 'text-danger' : '');
        let dText = p.lastDelta > 0 ? `+${p.lastDelta}` : (p.lastDelta < 0 ? `${p.lastDelta}` : '-');
        
        let flashClass = (hasFlashEffect && p.isUpdated === p.id) ? 'class="flash-update"' : '';
        // Xóa dấu vết hiệu ứng sau khi nạp dòng
        p.isUpdated = null;

        tbody.innerHTML += `
            <tr ${flashClass}>
                <td style="font-family:'Orbitron'; font-weight:bold; color:var(--gold);">${idx + 1}</td>
                <td><strong>${p.name}</strong></td>
                <td><span class="badge-team b-team-${p.team}">${p.team}</span></td>
                <td style="font-size:18px; font-weight:700; color:var(--accent);">${p.score}</td>
                <td><span class="${dClass}">${dText}</span></td>
                <td>${p.lastCompletionTime ? p.lastCompletionTime + 's' : '-'}</td>
                <td style="color:var(--muted);">${p.totalCompletionTime || 0}s</td>
            </tr>
        `;
    });
}
</script>
</body>
</html>
