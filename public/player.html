<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Đấu Trường Học Sinh</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        :root { --bg: #0a1128; --cyan: #00f0ff; --blue: #0066ff; --surface: #101f42; }
        body { background: var(--bg); color: #fff; font-family: sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .container { background: var(--surface); border: 3px solid var(--cyan); box-shadow: 0 0 20px var(--blue); border-radius: 12px; padding: 30px; width: 90%; max-width: 500px; text-align: center; box-sizing: border-box; }
        .avatar-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin: 20px 0; }
        .avatar-item { font-size: 1.8rem; background: #1a2f63; border: 2px solid var(--blue); border-radius: 6px; cursor: pointer; padding: 8px; }
        .avatar-item.selected { background: var(--cyan); box-shadow: 0 0 10px var(--cyan); color: #000; }
        input[type="text"] { width: 100%; padding: 12px; background: #0d1b3e; border: 2px solid var(--blue); color: #fff; border-radius: 6px; box-sizing: border-box; outline: none; }
        input[type="text"]:focus { border-color: var(--cyan); }
        .btn { background: linear-gradient(45deg, var(--blue), var(--cyan)); color: #000; font-weight: bold; border: none; padding: 12px 30px; border-radius: 6px; cursor: pointer; text-transform: uppercase; margin-top: 15px; }
        .chat-box { background: #071126; border: 2px solid var(--blue); height: 150px; overflow-y: auto; text-align: left; padding: 10px; margin-top: 15px; border-radius: 6px; }
        .hidden { display: none; }
    </style>
</head>
<body>

    <div class="container" id="login-box">
        <h2 style="color: var(--cyan);">VÀO PHÒNG THI ĐẤU</h2>
        <input type="text" id="username" placeholder="Nhập tên của bạn..." maxlength="12">
        <div class="avatar-grid">
            <div class="avatar-item" onclick="setAvt('⚛️', this)">⚛️</div>
            <div class="avatar-item" onclick="setAvt('⚡', this)">⚡</div>
            <div class="avatar-item" onclick="setAvt('💡', this)">💡</div>
            <div class="avatar-item" onclick="setAvt('🧲', this)">🧲</div>
        </div>
        <button class="btn" onclick="join()">Xác Nhận Sẵn Sàng</button>
    </div>

    <div class="container hidden" id="game-box">
        <h3 id="stage-info" style="color: var(--cyan);">VÒNG ĐẤU: 1/10 CÂU</h3>
        <p id="question-text" style="background: #12244f; padding: 20px; border-radius: 6px;">Đang tải câu hỏi Vật Lí...</p>
        <button class="btn" style="width:100%; margin: 5px 0;" onclick="nextQuestion(true)">Đáp án A (ĐÚNG)</button>
        <button class="btn" style="width:100%; margin: 5px 0; background: #333; color:#fff;" onclick="nextQuestion(false)">Đáp án B (SAI)</button>
    </div>

    <div class="container hidden" id="waiting-box">
        <h3>KHU VỰC CHỜ PHÒNG LUYỆN</h3>
        <p>Bạn đã hoàn thành chặng đua này. Hệ thống chat nội bộ đội đã kích hoạt!</p>
        <div class="chat-box" id="chats"></div>
        <input type="text" id="chat-msg" placeholder="Nhập tin nhắn..." onkeypress="sendChat(event)" style="margin-top:10px;">
    </div>

    <script>
        const socket = io();
        let myAvt = '', qIndex = 0, correct = 0, wrong = 0;

        function setAvt(avt, el) {
            document.querySelectorAll('.avatar-item').forEach(i => i.classList.remove('selected'));
            el.classList.add('selected'); myAvt = avt;
        }

        function join() {
            let name = document.getElementById('username').value.trim();
            if(!name || !myAvt) return alert('Hãy điền tên và chọn biểu tượng đại diện!');
            socket.emit('join_room', { name: name, avatar: myAvt });
            document.getElementById('login-box').classList.add('hidden');
            document.getElementById('waiting-box').classList.remove('hidden');
        }

        socket.on('assign_role', (d) => {
            if(d.role === 'spy') alert('🕵️ MẬT LỆNH: Bạn là GIÁN ĐIỆP đội A. Hãy cày điểm thật cao để chuyển giao cho đội B!');
            else alert(`Hệ thống phân phối: Bạn thuộc ĐỘI ${d.team}`);
        });

        socket.on('start_stage', () => {
            document.getElementById('waiting-box').classList.add('hidden');
            document.getElementById('game-box').classList.remove('hidden');
            qIndex = 0; correct = 0; wrong = 0;
            document.getElementById('stage-info').innerText = `CỬA 1: DAO ĐỘNG (${qIndex+1}/10)`;
        });

        function nextQuestion(isCorrect) {
            if(isCorrect) correct++; else wrong++;
            qIndex++;
            if(qIndex >= 10) {
                socket.emit('submit_stage', { correctCount: correct, wrongCount: wrong });
                document.getElementById('game-box').classList.add('hidden');
                document.getElementById('waiting-box').classList.remove('hidden');
            } else {
                document.getElementById('stage-info').innerText = `CỬA 1: DAO ĐỘNG (${qIndex+1}/10)`;
            }
        }

        function sendChat(e) {
            if(e.key === 'Enter') {
                let input = document.getElementById('chat-msg');
                if(!input.value.trim()) return;
                socket.emit('send_message', input.value);
                input.value = '';
            }
        }

        socket.on('receive_message', (d) => {
            let box = document.getElementById('chats');
            box.innerHTML += `<div><b>${d.avatar} ${d.name} [Đội ${d.team}]:</b> ${d.text}</div>`;
            box.scrollTop = box.scrollHeight;
        });

        socket.on('error_message', (msg) => alert(msg));
    </script>
</body>
</html>
