<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Người Chơi – Đấu Trường</title>
    <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@500;700&family=IBM+Plex+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        :root { --bg: #0a0e1a; --panel: #111827; --border: #1e3a5f; --accent: #00d2ff; --text: #f3f4f6; --success: #00ff88; --danger: #ff4a4a; --team-a: #ff4a4a; --team-b: #00d2ff; }
        * { box-sizing: border-box; touch-action: manipulation; }
        body { margin: 0; padding: 0; background-color: var(--bg); color: var(--text); font-family: 'IBM Plex Sans', sans-serif; text-align: center; min-height: 100vh; overflow-x: hidden; }

        #top-progress-container { position: fixed; top: 0; left: 0; width: 100%; height: 6px; background: #1e293b; z-index: 9999; display: none; }
        #top-progress-bar { width: 100%; height: 100%; background: var(--success); transition: width 1s linear, background-color 0.5s ease; }

        .screen { display: none; }
        .screen.active { display: block; }

        .card-box { max-width: 520px; margin: 40px auto; padding: 28px 24px; background: var(--panel); border: 2px solid var(--border); border-radius: 16px; }
        .arena-title { font-family: 'Chakra Petch', sans-serif; color: var(--accent); font-size: 1.8rem; letter-spacing: 2px; margin: 0 0 6px 0; }
        
        input[type="text"] { width: 100%; padding: 12px 16px; border-radius: 8px; border: 1px solid var(--border); background: #0f172a; color: #fff; font-size: 1rem; outline: none; transition: 0.2s; margin-bottom: 15px;}
        input[type="text"]:focus { border-color: var(--accent); }
        .btn-primary { width: 100%; padding: 13px; border-radius: 8px; border: none; background: var(--accent); color: #000; font-weight: 700; font-size: 1rem; cursor: pointer; transition: 0.2s; font-family: 'Chakra Petch', sans-serif;}
        .btn-primary:hover { opacity: 0.9; }

        .avatar-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; max-height: 300px; overflow-y: auto; padding: 4px; margin-bottom:15px; }
        .avatar-cell { aspect-ratio: 1; background: #0f172a; border: 2px solid #1e293b; border-radius: 10px; cursor: pointer; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 1.6rem; transition: all 0.15s; }
        .avatar-cell.selected { border-color: var(--accent); background: rgba(0, 210, 255, 0.12); }
        .avatar-cell .av-name { font-size: 0.5rem; color: #64748b; margin-top: 2px; line-height: 1; }

        #waiting-screen { width: 100%; min-height: 100vh; position: relative; overflow: hidden; background: radial-gradient(ellipse at center, #0d1625 0%, #07090f 100%); }
        #arena-floor { position: absolute; inset: 0; overflow: hidden; z-index: 1;}
        #arena-floor::before { content: ''; position: absolute; inset: 0; background-image: linear-gradient(rgba(0, 210, 255, 0.04) 1px, transparent 1px), linear-gradient(90deg, rgba(0, 210, 255, 0.04) 1px, transparent 1px); background-size: 40px 40px; }
        
        .player-token { position: absolute; display: flex; flex-direction: column; align-items: center; gap: 2px; pointer-events: none; transition: left 0.1s linear, top 0.1s linear; transform: translate(-50%, -50%); }
        .player-token .token-av { font-size: 2.2rem; filter: drop-shadow(0 2px 8px rgba(0,0,0,0.8)); line-height: 1; z-index: 2; }
        .player-token .token-label { background: rgba(0, 0, 0, 0.75); border: 1px solid rgba(255,255,255,0.15); border-radius: 12px; padding: 2px 8px; font-size: 0.65rem; font-weight: 600; white-space: nowrap; color: #fff; z-index: 2;}
        .player-token.team-a .token-label { border-color: rgba(255, 74, 74, 0.5); color: #ffb3b3; }
        .player-token.team-b .token-label { border-color: rgba(0, 210, 255, 0.5); color: #b3f0ff; }
        .player-token.is-me .token-label::before { content: '★ '; color: #ffd700; }

        /* D-Pad Controller */
        #dpad-container { position: fixed; bottom: 30px; right: 30px; width: 140px; height: 140px; background: rgba(255,255,255,0.05); border-radius: 50%; z-index: 100; border: 2px solid rgba(0,210,255,0.2); }
        .dpad-btn { position: absolute; width: 44px; height: 44px; background: rgba(0,210,255,0.3); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; color: #fff; user-select: none; }
        .dpad-btn:active { background: rgba(0,210,255,0.8); }
        #btn-up { top: 5px; left: 48px; } #btn-down { bottom: 5px; left: 48px; }
        #btn-left { top: 48px; left: 5px; } #btn-right { top: 48px; right: 5px; }

        .choice-btn { width: 100%; text-align: left; background: #1e293b; color: #fff; border: 1px solid var(--border); padding: 14px; border-radius: 8px; cursor: pointer; font-size: 0.95rem; margin-bottom: 8px; }
        .choice-btn:not(:disabled):hover { background: #334155; border-color: var(--accent); }
        .choice-btn:disabled { opacity: 0.6; }
    </style>
</head>
<body>

<div id="top-progress-container"><div id="top-progress-bar"></div></div>

<div id="room-entry-screen" class="screen card-box">
    <h2 class="arena-title">VÀO PHÒNG</h2>
    <p style="color:#94a3b8; font-size:0.9rem;">Nhập mã phòng do Giáo viên cung cấp</p>
    <input type="text" id="input-room-id" placeholder="Mã phòng..." maxlength="6" style="text-transform:uppercase;">
    <button class="btn-primary" onclick="verifyRoom()">TIẾP TỤC</button>
</div>

<div id="lobby-screen" class="screen card-box">
    <h2 class="arena-title">ARENA VẬT LÍ</h2>
    <input type="text" id="input-name" placeholder="Nhập tên hiển thị..." maxlength="20">
    <div style="text-align:left; color:#94a3b8; font-size:0.8rem; margin-bottom:5px;">CHỌN AVATAR ĐẠI DIỆN</div>
    <div class="avatar-grid" id="avatar-grid"></div>
    <button class="btn-primary" onclick="joinRoom()">THAM GIA NGAY</button>
</div>

<div id="waiting-screen" class="screen">
    <div style="position:absolute; top:20px; left:20px; z-index:10; background:rgba(0,0,0,0.5); padding:10px; border-radius:8px; border:1px solid var(--border);">
        <div style="color:var(--accent); font-family:'Chakra Petch'; font-size:1.2rem;">SẢNH CHỜ</div>
        <div style="font-size:0.8rem; color:#94a3b8;">Sử dụng D-Pad góc phải để di chuyển</div>
    </div>
    
    <div id="arena-floor"></div>

    <div id="dpad-container">
        <div class="dpad-btn" id="btn-up">↑</div>
        <div class="dpad-btn" id="btn-down">↓</div>
        <div class="dpad-btn" id="btn-left">←</div>
        <div class="dpad-btn" id="btn-right">→</div>
    </div>
</div>

<div id="game-screen" class="screen card-box" style="max-width:600px;">
    <div style="display:flex; justify-content:space-between; margin-bottom:15px; color:var(--accent);">
        <span id="stage-title" style="font-weight:600;">STAGE 1</span>
        <span id="timer-text" style="font-family:'Chakra Petch'; font-weight:bold; font-size:1.2rem;">60s</span>
    </div>
    <div id="question-box"></div>
</div>

<div id="intermission-screen" class="screen card-box">
    <h3 style="color:var(--success);">GIẢI LAO (<span id="break-timer">15</span>s)</h3>
    <div style="display:flex; justify-content:space-around; background:#1e293b; padding:15px; border-radius:8px; font-weight:bold; font-size:1.1rem;">
        <span style="color:var(--team-a);">Điểm TB Đội A: <span id="score-a">0</span>đ</span>
        <span style="color:var(--team-b);">Điểm TB Đội B: <span id="score-b">0</span>đ</span>
    </div>
</div>

<script>
// 50 Avatars Động Vật Mở Rộng
const AVATARS = [
    {emoji:'🦁', name:'Sư Tử'}, {emoji:'🐯', name:'Hổ'}, {emoji:'🦊', name:'Cáo'}, {emoji:'🐺', name:'Sói'}, {emoji:'🦌', name:'Hươu'},
    {emoji:'🐘', name:'Voi'}, {emoji:'🦒', name:'Hươu Cao'}, {emoji:'🦓', name:'Ngựa Vằn'}, {emoji:'🐆', name:'Báo'}, {emoji:'🦅', name:'Đại Bàng'},
    {emoji:'🦉', name:'Cú'}, {emoji:'🦜', name:'Vẹt'}, {emoji:'🐸', name:'Ếch'}, {emoji:'🦎', name:'Tắc Kè'}, {emoji:'🐢', name:'Rùa'},
    {emoji:'🦔', name:'Nhím'}, {emoji:'🦦', name:'Rái Cá'}, {emoji:'🦥', name:'Lười'}, {emoji:'🦩', name:'Hồng Hạc'}, {emoji:'🐓', name:'Gà Trống'},
    {emoji:'🦈', name:'Cá Mập'}, {emoji:'🐬', name:'Cá Heo'}, {emoji:'🐋', name:'Cá Voi'}, {emoji:'🐙', name:'Bạch Tuộc'}, {emoji:'🦑', name:'Mực'},
    {emoji:'🦞', name:'Tôm Hùm'}, {emoji:'🦀', name:'Cua'}, {emoji:'🐡', name:'Cá Nóc'}, {emoji:'🐠', name:'Cá Nhiệt Đới'}, {emoji:'🦭', name:'Hải Cẩu'},
    {emoji:'🦝', name:'Gấu Trúc'}, {emoji:'🐗', name:'Lợn Rừng'}, {emoji:'🦇', name:'Dơi'}, {emoji:'🐝', name:'Ong'}, {emoji:'🦋', name:'Bướm'},
    {emoji:'🐌', name:'Ốc Sên'}, {emoji:'🐞', name:'Bọ Rùa'}, {emoji:'🦖', name:'T-Rex'}, {emoji:'🦕', name:'Khủng Long'}, {emoji:'🐉', name:'Rồng'},
    {emoji:'🦨', name:'Chồn'}, {emoji:'🦡', name:'Lửng'}, {emoji:'🐿️', name:'Sóc'}, {emoji:'🐾', name:'Dấu Chân'}, {emoji:'🐲', name:'Rồng Lửa'},
    {emoji:'🦗', name:'Dế'}, {emoji:'🦂', name:'Bọ Cạp'}, {emoji:'🕷️', name:'Nhện'}, {emoji:'🐧', name:'Chim Cánh Cụt'}, {emoji:'🦘', name:'Kangaroo'}
];

const socket = io();
let currentRoomId = '';
let myName = '';
let myAvatar = AVATARS[0]; // Mặc định chọn cái đầu tiên
let myPos = { x: 50, y: 50 }; // % Tọa độ
let moveInterval = null;
let currentQuestions = [];
let questionIndex = 0;

window.addEventListener('DOMContentLoaded', () => {
    buildAvatarGrid();
    const params = new URLSearchParams(window.location.search);
    const roomParam = params.get('room');
    if (roomParam) {
        currentRoomId = roomParam.toUpperCase();
        switchScreen('lobby-screen');
    } else {
        switchScreen('room-entry-screen');
    }
});

function switchScreen(screenId) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(screenId).classList.add('active');
}

function buildAvatarGrid() {
    const grid = document.getElementById('avatar-grid');
    AVATARS.forEach((av, i) => {
        const cell = document.createElement('div');
        cell.className = 'avatar-cell' + (i===0 ? ' selected' : '');
        cell.innerHTML = `<span>${av.emoji}</span><span class="av-name">${av.name}</span>`;
        cell.addEventListener('click', () => {
            document.querySelectorAll('.avatar-cell').forEach(c => c.classList.remove('selected'));
            cell.classList.add('selected');
            myAvatar = av;
        });
        grid.appendChild(cell);
    });
}

function verifyRoom() {
    const rId = document.getElementById('input-room-id').value.trim();
    if(!rId) return;
    socket.emit('checkRoomExists', rId, (res) => {
        if(res.success) {
            currentRoomId = rId.toUpperCase();
            switchScreen('lobby-screen');
        } else {
            alert(res.msg);
        }
    });
}

function joinRoom() {
    myName = document.getElementById('input-name').value.trim();
    if (!myName) return alert('Vui lòng nhập tên của bạn!');
    socket.emit('playerJoinRoom', { roomId: currentRoomId, name: myName, avatar: myAvatar });
}

socket.on('joinedRoom', (data) => {
    switchScreen('waiting-screen');
});

// Render các Token trên sàn arena
socket.on('updatePlayerList', (players) => {
    const floor = document.getElementById('arena-floor');
    floor.innerHTML = ''; // Render lại hoàn toàn
    players.forEach(p => {
        if(p.id === socket.id) myPos = p.pos; // Lấy pos từ server cấp
        createToken(floor, p);
    });
});

function createToken(floor, p) {
    const el = document.createElement('div');
    el.id = 'av-' + p.id;
    el.className = `player-token team-${p.team.toLowerCase()} ${p.id === socket.id ? 'is-me' : ''}`;
    el.innerHTML = `<div class="token-av">${p.avatar.emoji}</div><div class="token-label">${p.name}</div>`;
    el.style.left = (p.pos?.x || 50) + '%';
    el.style.top = (p.pos?.y || 50) + '%';
    floor.appendChild(el);
}

socket.on('playerMoved', (data) => {
    const el = document.getElementById('av-' + data.id);
    if(el) { el.style.left = data.x + '%'; el.style.top = data.y + '%'; }
});

// ─── XỬ LÝ D-PAD ──────────────────────────
const dirs = { up: false, down: false, left: false, right: false };
const speed = 1.5; // Tốc độ di chuyển (%)

function setDir(dir, val) { dirs[dir] = val; }
['up', 'down', 'left', 'right'].forEach(d => {
    const btn = document.getElementById('btn-' + d);
    btn.addEventListener('mousedown', () => setDir(d, true));
    btn.addEventListener('mouseup', () => setDir(d, false));
    btn.addEventListener('mouseleave', () => setDir(d, false));
    btn.addEventListener('touchstart', (e) => { e.preventDefault(); setDir(d, true); });
    btn.addEventListener('touchend', (e) => { e.preventDefault(); setDir(d, false); });
});

// Game loop gửi vị trí
setInterval(() => {
    if (document.getElementById('waiting-screen').classList.contains('active')) {
        let moved = false;
        if(dirs.up) { myPos.y = Math.max(5, myPos.y - speed); moved = true; }
        if(dirs.down) { myPos.y = Math.min(95, myPos.y + speed); moved = true; }
        if(dirs.left) { myPos.x = Math.max(5, myPos.x - speed); moved = true; }
        if(dirs.right) { myPos.x = Math.min(95, myPos.x + speed); moved = true; }
        
        if(moved) {
            socket.emit('playerMove', { x: myPos.x, y: myPos.y });
            const me = document.getElementById('av-' + socket.id);
            if(me) { me.style.left = myPos.x + '%'; me.style.top = myPos.y + '%'; }
        }
    }
}, 50);

// ─── GAME LOGIC ──────────────────────────
function renderMath(elementId) {
    const el = document.getElementById(elementId);
    if (el && window.renderMathInElement) {
        renderMathInElement(el, { delimiters: [{left:'$$',right:'$$',display:true},{left:'$',right:'$',display:false}], throwOnError: false });
    }
}

socket.on('gameStarted', () => { switchScreen('game-screen'); });

socket.on('startStage', (data) => {
    currentQuestions = data.questions;
    questionIndex = 0;
    document.getElementById('stage-title').innerText = `STAGE ${data.stageNum}${data.isDouble ? ' (X2 ĐIỂM)' : ''}`;
    document.getElementById('top-progress-container').style.display = 'block';
    switchScreen('game-screen');
    renderSingleQuestion();
});

function renderSingleQuestion() {
    const box = document.getElementById('question-box');
    if (questionIndex >= currentQuestions.length) {
        box.innerHTML = `<div style="padding:30px 10px;"><h3>Đã gửi toàn bộ câu trả lời!</h3><p style="color:#94a3b8;">Vui lòng đợi đồng đội hoàn tất...</p></div>`;
        return;
    }
    const q = currentQuestions[questionIndex];
    let html = `
        <div style="font-size:0.9rem; color:#94a3b8; text-align:left; margin-bottom:5px;">Câu hỏi ${questionIndex + 1}/${currentQuestions.length}</div>
        <h3 style="text-align:left; line-height:1.5; margin-bottom:20px;">${q.text}</h3>
        <div style="display:flex; flex-direction:column; gap:8px;">
    `;
    q.choices.forEach(c => {
        html += `<button class="choice-btn" onclick="selectAnswer('${q.id}', '${c.key}')"><strong>${c.key}.</strong> ${c.text}</button>`;
    });
    html += `</div><div id="feedback-badge" style="margin-top:20px; font-size:1.3rem; font-weight:bold; min-height:30px;"></div>`;
    box.innerHTML = html;
    renderMath('question-box');
}

function selectAnswer(questionId, choiceKey) {
    document.querySelectorAll('.choice-btn').forEach(b => b.disabled = true);
    socket.emit('submitSingleAnswer', { roomId: currentRoomId, questionId, answer: choiceKey });
}

socket.on('singleAnswerResult', (data) => {
    const badge = document.getElementById('feedback-badge');
    if (data.isCorrect) {
        badge.innerHTML = `<span style="color:var(--success);">✓ CHÍNH XÁC (${data.points})</span>`;
    } else {
        badge.innerHTML = `<span style="color:var(--danger);">✗ SAI RỒI (${data.points})</span>`;
    }
    setTimeout(() => { questionIndex++; renderSingleQuestion(); }, 1000);
});

socket.on('timerUpdate', (timeLeft) => {
    const el = document.getElementById('timer-text');
    if(el && document.getElementById('game-screen').classList.contains('active')) {
        el.innerText = timeLeft + 's';
        const bar = document.getElementById('top-progress-bar');
        bar.style.width = (timeLeft / 60 * 100) + '%';
    } else {
        const br = document.getElementById('break-timer');
        if(br) br.innerText = timeLeft;
    }
});

socket.on('intermissionStart', (data) => {
    document.getElementById('top-progress-container').style.display = 'none';
    document.getElementById('score-a').innerText = data.scoreA;
    document.getElementById('score-b').innerText = data.scoreB;
    switchScreen('intermission-screen');
});

socket.on('gameOver', (d) => {
    document.getElementById('top-progress-container').style.display = 'none';
    document.getElementById('intermission-screen').innerHTML = `
        <h2 style="font-family:'Chakra Petch'; color:#ff007f;">TRÒ CHƠI KẾT THÚC</h2>
        <h3 style="color:#fff;">${d.winningTeam === 'Hòa' ? 'HÒA NHAU!' : 'ĐỘI CHIẾN THẮNG: ĐỘI ' + d.winningTeam}</h3>
        <p>Vui lòng xem chi tiết trên bảng Giáo viên!</p>
    `;
    switchScreen('intermission-screen');
});

socket.on('roomResetByAdmin', () => { window.location.reload(); });
socket.on('errorMsg', m => alert(m));
</script>
</body>
</html>
