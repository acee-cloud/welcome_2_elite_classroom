<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nguoi Choi - Vat Li</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.10/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.10/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.10/dist/contrib/auto-render.min.js"
        onload="katexReady = true; maybeRenderMath()"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=IBM+Plex+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="/socket.io/socket.io.js"></script>
    <style>
        :root {
            --bg: #0a0e1a; --panel: #111827; --border: #1e3a5f;
            --accent: #00d4ff; --team-a: #ff4d6d; --team-b: #38bdf8; --team-c: #a78bfa;
            --gold: #ffd700; --success: #34d399; --danger: #f87171;
            --text: #e2e8f0; --muted: #64748b;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'IBM Plex Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; padding: 16px; padding-bottom: 40px; }
        .hidden { display: none !important; }
        .screen { max-width: 600px; margin: 0 auto; }
        .panel { background: var(--panel); border: 1px solid var(--border); border-radius: 16px; padding: 20px; margin-bottom: 14px; }
        .page-title { font-family: 'Orbitron', monospace; font-size: 20px; font-weight: 900; text-align: center; color: var(--accent); letter-spacing: 3px; margin-bottom: 20px; }
        .field { margin-bottom: 14px; }
        .field label { display: block; font-size: 12px; font-weight: 700; color: var(--muted); text-transform: uppercase; margin-bottom: 6px; }
        .input { width: 100%; padding: 12px 14px; background: rgba(0,0,0,0.3); border: 1px solid var(--border); border-radius: 10px; color: var(--text); font-size: 16px; outline: none; }
        .btn { display: block; width: 100%; padding: 14px; font-family: 'Orbitron', monospace; font-size: 14px; font-weight: 700; color: #000; background: var(--accent); border: none; border-radius: 10px; cursor: pointer; text-align: center; margin-top: 8px; }
        .btn-success { background: var(--success); }
        .badge-a { background: rgba(255,77,109,0.15); color: var(--team-a); border: 1px solid var(--team-a); padding: 8px 20px; border-radius: 20px; font-weight: bold;}
        .badge-b { background: rgba(56,189,248,0.15); color: var(--team-b); border: 1px solid var(--team-b); padding: 8px 20px; border-radius: 20px; font-weight: bold;}
        .badge-c { background: rgba(167,139,250,0.15); color: var(--team-c); border: 1px solid var(--team-c); padding: 8px 20px; border-radius: 20px; font-weight: bold;}
        .badge-solo { background: rgba(255,215,0,0.15); color: var(--gold); border: 1px solid var(--gold); padding: 8px 20px; border-radius: 20px; font-weight: bold;}
        
        .sticky-header { position: sticky; top: 0; z-index: 100; background: var(--panel); border: 1px solid var(--border); border-radius: 14px; padding: 12px 16px; display: flex; flex-direction: column; gap: 10px; margin-bottom: 14px; box-shadow: 0 4px 20px rgba(0,0,0,0.5); }
        .header-top { display: flex; justify-content: space-between; align-items: center; }
        .header-stage { font-family: 'Orbitron', monospace; font-size: 15px; font-weight: 700; }
        .time-bar-bg { width: 100%; height: 6px; background: rgba(255,255,255,0.1); border-radius: 3px; overflow: hidden; }
        .time-bar-fill { height: 100%; background: var(--accent); width: 100%; transition: width 1s linear, background-color 0.3s; }
        
        .question-block { padding: 10px 0; }
        .question-text { font-size: 18px; font-weight: 600; line-height: 1.6; margin-bottom: 20px; }
        .options-grid { display: flex; flex-direction: column; gap: 12px; }
        .option-btn { background: rgba(255,255,255,0.05); border: 1px solid var(--border); padding: 16px; border-radius: 10px; cursor: pointer; font-size: 16px; text-align: left; color: var(--text); transition: all 0.2s; }
        .option-btn:active { background: rgba(0,212,255,0.2); }
        
        .result-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.85); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 999; }
        .result-points { font-size: 48px; font-weight: bold; font-family: 'Orbitron', monospace; }
        .text-success { color: var(--success); }
        .text-danger { color: var(--danger); }
        
        .chat-box { height: 200px; overflow-y: auto; background: rgba(0,0,0,0.3); border: 1px solid var(--border); border-radius: 8px; padding: 10px; margin-bottom: 10px; font-size: 14px; }
        .chat-input-grp { display: flex; gap: 8px; }
        .chat-input { flex: 1; padding: 10px; background: rgba(0,0,0,0.5); border: 1px solid var(--border); color: white; border-radius: 8px; }
        
        textarea.form-control, input.form-control { width: 100%; padding: 12px; background: rgba(0,0,0,0.5); border: 1px solid var(--border); color: white; border-radius: 8px; margin-bottom: 15px; font-family: inherit; font-size: 15px; }
        textarea.form-control { min-height: 100px; resize: vertical; }
        .answer-item { background: rgba(255,255,255,0.05); padding: 15px; border-radius: 8px; margin-bottom: 10px; border-left: 4px solid var(--accent); }
    </style>
</head>
<body>

<div id="screen-join" class="screen">
    <h1 class="page-title">VAT LI</h1>
    <div class="panel">
        <div class="field">
            <label>Ma Phong</label>
            <input type="text" id="input-room-id" class="input" style="text-transform:uppercase; text-align:center; letter-spacing: 4px;" maxlength="6">
        </div>
        <div class="field">
            <label>Ten Nguoi Choi</label>
            <input type="text" id="input-name" class="input">
        </div>
        <button class="btn" onclick="joinRoom()">VAO PHONG</button>
    </div>
</div>

<div id="screen-lobby" class="screen hidden">
    <div class="panel" style="text-align: center;">
        <p style="font-size:16px;">Xin chao, <strong id="player-display-name" style="color:var(--accent);">...</strong>!</p>
        <p style="color:var(--muted); margin-top: 15px;">Dang cho he thong bat dau...</p>
    </div>
</div>

<div id="screen-role" class="screen hidden">
    <div class="panel" style="text-align: center;">
        <p style="font-size:14px; color:var(--muted); margin-bottom:15px;">DOI CUA BAN</p>
        <div id="team-badge"></div>
        <p style="color:var(--muted); margin-top: 25px;">Chuan bi vao vong 1...</p>
    </div>
</div>

<div id="screen-game" class="screen hidden">
    <div class="sticky-header">
        <div class="header-top">
            <div class="header-stage" id="display-stage-title">Vong 1</div>
            <div style="font-weight: bold; font-family: 'Orbitron', monospace; font-size: 18px;" id="game-timer-text">60</div>
        </div>
        <div class="time-bar-bg"><div class="time-bar-fill" id="time-bar-fill"></div></div>
    </div>
    <div class="panel" id="question-container"></div>
</div>

<div id="screen-intermission" class="screen hidden">
    <div class="panel" style="text-align: center;">
        <h2 style="color:var(--accent); margin-bottom: 10px;">GIAI LAO</h2>
        <p style="margin-bottom: 20px;">Thoi gian con lai: <strong id="intermission-timer" style="color:var(--danger); font-size: 20px;">30</strong>s</p>
        <div class="chat-box" id="chat-messages" style="text-align: left;"></div>
        <div class="chat-input-grp">
            <input type="text" id="chat-input-text" class="chat-input" placeholder="Chat voi moi nguoi...">
            <button class="btn" style="width: auto; margin: 0; padding: 10px 20px;" onclick="sendGlobalChat()">GUI</button>
        </div>
    </div>
</div>

<div id="screen-essay" class="screen hidden">
    <div class="panel" id="game-area-essay"></div>
</div>

<div id="screen-winner" class="screen hidden">
    <div class="panel" style="text-align: center;">
        <h2 style="color:var(--gold); margin-bottom: 20px; font-family: 'Orbitron', monospace;">KET THUC</h2>
        <div id="final-results"></div>
    </div>
</div>

<div id="result-overlay" class="result-overlay hidden">
    <div id="overlay-points" class="result-points"></div>
</div>

<script>
let katexReady = false;
const pendingRenderTargets = [];
function maybeRenderMath() {
    if (!katexReady) return;
    pendingRenderTargets.forEach(el => renderMathIn(el));
    pendingRenderTargets.length = 0;
}
function renderMathIn(el) {
    if (!el) return;
    if (katexReady && typeof renderMathInElement === 'function') {
        renderMathInElement(el, {
            delimiters: [ { left: '$$', right: '$$', display: true }, { left: '$', right: '$', display: false }, { left: '\\(', right: '\\)', display: false }, { left: '\\[', right: '\\]', display: true } ],
            throwOnError: false
        });
    } else { pendingRenderTargets.push(el); }
}

const socket = io();
let myRoomId = '';
let myTeam = '';
let currentQuestions = [];
let currentQIndex = 0;
let stageStartTime = 0;

function showScreen(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.add('hidden'));
    document.getElementById(id).classList.remove('hidden');
    window.scrollTo(0, 0);
}

function joinRoom() {
    myRoomId = document.getElementById('input-room-id').value.trim().toUpperCase();
    const myName = document.getElementById('input-name').value.trim();
    if (!myRoomId || !myName) return alert('Nhap thieu thong tin!');
    document.getElementById('player-display-name').innerText = myName;
    socket.emit('playerJoinRoom', { roomId: myRoomId, name: myName });
    showScreen('screen-lobby');
}

socket.on('errorMsg', (msg) => { alert(msg); showScreen('screen-join'); });

socket.on('roleAssignment', (data) => {
    myTeam = data.team;
    const badge = document.getElementById('team-badge');
    if (myTeam === 'A') { badge.className = 'badge-a'; badge.innerText = 'DOI A'; }
    else if (myTeam === 'B') { badge.className = 'badge-b'; badge.innerText = 'DOI B'; }
    else if (myTeam === 'C') { badge.className = 'badge-c'; badge.innerText = 'DOI C (Le)'; }
    else { badge.className = 'badge-solo'; badge.innerText = 'SOLO'; }
    showScreen('screen-role');
});

socket.on('startStage', (data) => {
    currentQuestions = data.questions;
    currentQIndex = 0;
    stageStartTime = Date.now();
    document.getElementById('display-stage-title').innerText = `Vong ${data.stageNum} ` + (data.isDouble ? '(X2 DIEM)' : '');
    showScreen('screen-game');
    renderCurrentQuestion();
});

function renderCurrentQuestion() {
    const container = document.getElementById('question-container');
    container.innerHTML = '';
    if (currentQIndex >= currentQuestions.length) {
        container.innerHTML = `<h3 style="text-align:center; color:var(--success); margin-top:20px;">Da hoan thanh cac cau hoi!</h3><p style="text-align:center; color:var(--muted);">Dang cho ket thuc vong...</p>`;
        return;
    }

    const q = currentQuestions[currentQIndex];
    const block = document.createElement('div');
    block.className = 'question-block';
    block.innerHTML = `<div class="question-text"><strong>Cau ${currentQIndex + 1}:</strong> ${q.text}</div>`;
    
    const gridDiv = document.createElement('div');
    gridDiv.className = 'options-grid';
    
    q.choices.forEach(c => {
        const btn = document.createElement('button');
        btn.className = 'option-btn';
        btn.innerHTML = `<strong>${c.key}.</strong> ${c.text}`;
        btn.onclick = () => submitSingleAnswer(q.id, c.key);
        gridDiv.appendChild(btn);
    });

    block.appendChild(gridDiv);
    container.appendChild(block);
    renderMathIn(container);
}

function submitSingleAnswer(qId, ansKey) {
    const timeTaken = Math.floor((Date.now() - stageStartTime) / 1000);
    socket.emit('submitSingleAnswer', { roomId: myRoomId, questionId: qId, answer: ansKey, timeTaken });
}

socket.on('singleAnswerResult', (data) => {
    const overlay = document.getElementById('result-overlay');
    const pts = document.getElementById('overlay-points');
    pts.innerText = data.points;
    pts.className = 'result-points ' + (data.isCorrect ? 'text-success' : 'text-danger');
    
    overlay.classList.remove('hidden');
    setTimeout(() => {
        overlay.classList.add('hidden');
        currentQIndex++;
        renderCurrentQuestion();
    }, 1200);
});

socket.on('timerUpdate', (seconds) => {
    const el = document.getElementById('game-timer-text');
    if (el) el.innerText = seconds;
    const bar = document.getElementById('time-bar-fill');
    if (bar) {
        const pct = (seconds / 60) * 100;
        bar.style.width = `${pct}%`;
        bar.style.backgroundColor = seconds < 10 ? 'var(--danger)' : 'var(--accent)';
    }
    const inter = document.getElementById('intermission-timer');
    if(inter) inter.innerText = seconds;
});

socket.on('intermissionStart', () => {
    showScreen('screen-intermission');
    document.getElementById('chat-messages').innerHTML = '';
});

function sendGlobalChat() {
    const input = document.getElementById('chat-input-text');
    if (input.value.trim()) {
        socket.emit('sendGlobalMessage', { roomId: myRoomId, msg: input.value });
        input.value = '';
    }
}

socket.on('receiveGlobalMessage', (data) => {
    const box = document.getElementById('chat-messages');
    box.innerHTML += `<div style="margin-bottom: 5px;"><strong>${data.name} [${data.team}]:</strong> ${data.msg}</div>`;
    box.scrollTop = box.scrollHeight;
});

// Essay Round
socket.on('essayRoundRequestQuestion', (data) => {
    showScreen('screen-essay');
    document.getElementById('game-area-essay').innerHTML = `
        <h3 style="color:var(--accent); margin-bottom: 15px;">VONG TU LUAN (DOI C)</h3>
        <p style="margin-bottom: 15px;">Hay tao 1 cau hoi tu luan that kho de thach do Doi A va B. Nguoi tra loi dung nhanh nhat se nhan toan bo <strong>${data.scoreC} diem</strong>.</p>
        <input type="text" id="essayQuestionInput" class="form-control" placeholder="Nhap cau hoi...">
        <button id="btnSendEssayQuestion" class="btn btn-success">GUI CAU HOI</button>
        <div style="margin-top: 30px;"><div id="receivedAnswersList"></div></div>
    `;
    document.getElementById('btnSendEssayQuestion').onclick = () => {
        const text = document.getElementById('essayQuestionInput').value;
        if(text.trim()) {
            socket.emit('submitEssayQuestion', { roomId: myRoomId, questionText: text });
            document.getElementById('essayQuestionInput').disabled = true;
            document.getElementById('btnSendEssayQuestion').style.display = 'none';
        }
    };
});

socket.on('essayRoundBroadcastQuestion', (data) => {
    if (myTeam === 'A' || myTeam === 'B') {
        showScreen('screen-essay');
        document.getElementById('game-area-essay').innerHTML = `
            <h3 style="color:var(--accent); margin-bottom: 15px;">CAU HOI TU ${data.creatorName}:</h3>
            <p style="font-size: 18px; margin-bottom: 20px;"><strong>${data.questionText}</strong></p>
            <textarea id="essayAnswerInput" class="form-control" placeholder="Tra loi nhanh nhat co the..."></textarea>
            <button id="btnSendEssayAnswer" class="btn btn-success">NOP BAI</button>
        `;
        document.getElementById('btnSendEssayAnswer').onclick = () => {
            const ans = document.getElementById('essayAnswerInput').value;
            if(ans.trim()) {
                socket.emit('submitEssayAnswer', { roomId: myRoomId, answerText: ans });
                document.getElementById('game-area-essay').innerHTML = `<h3 style="text-align:center; color:var(--success)">DA GUI! Dang cho ket qua...</h3>`;
            }
        };
    }
});

socket.on('essayRoundNewAnswer', (data) => {
    const list = document.getElementById('receivedAnswersList');
    if (list) {
        list.innerHTML += `
            <div class="answer-item">
                <p style="margin-bottom: 10px;"><strong>${data.name} (Doi ${data.team}):</strong> ${data.answerText}</p>
                <button onclick="approveAnswer('${data.playerId}')" class="btn btn-success" style="padding: 5px 15px;">CHON DAP AN NAY</button>
            </div>
        `;
    }
});

window.approveAnswer = function(playerId) {
    if(confirm('Chon cau nay lam dap an dung?')) {
        socket.emit('chooseBestEssayAnswer', { roomId: myRoomId, playerId: playerId });
    }
};

socket.on('gameOver', (data) => {
    showScreen('screen-winner');
    let winHtml = data.winningTeam === 'HOA' ? `<h3 style="color:var(--gold); font-size: 24px;">HOA NHAU!</h3>` : `<h3 style="color:var(--accent); font-size: 24px;">DOI CHIEN THANG: DOI ${data.winningTeam}</h3>`;
    let bonusInfo = data.essayBonusDetails ? `<div style="margin: 15px 0; color:var(--success);"><strong>${data.essayBonusDetails.winnerName}</strong> (Doi ${data.essayBonusDetails.winningTeam}) da doat them ${data.essayBonusDetails.bonusPoints} diem tu Doi C!</div>` : '';
    
    document.getElementById('final-results').innerHTML = `
        ${winHtml}
        <p style="font-size: 18px; margin: 15px 0;">Doi A: <strong>${data.scoreA}</strong> | Doi B: <strong>${data.scoreB}</strong></p>
        ${bonusInfo}
        <p style="margin-top: 30px; font-size: 14px; color: var(--muted);">He thong dang cho admin reset.</p>
    `;
});

socket.on('gameReset', () => window.location.reload());
</script>
</body>
</html>
