<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Người Chơi – Vật Lí</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=IBM+Plex+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="/socket.io/socket.io.js"></script>
    <style>
        :root { --bg: #0a0e1a; --panel: #111827; --border: #1e3a5f; --accent: #00d2ff; --text: #f3f4f6; }
        body { margin: 0; padding: 0; background-color: var(--bg); color: var(--text); font-family: 'IBM Plex Sans', sans-serif; text-align: center; }
        
        /* THANH THỜI GIAN 60S TRÊN CÙNG */
        #top-progress-container { position: fixed; top: 0; left: 0; width: 100%; height: 6px; background: #1e293b; z-index: 9999; display: none; }
        #top-progress-bar { width: 100%; height: 100%; background: #00ff88; transition: width 1s linear, background-color 0.5s ease; }
        
        .screen { display: none; max-width: 500px; margin: 50px auto; padding: 20px; background: var(--panel); border: 2px solid var(--border); border-radius: 12px; }
        .active { display: block; }
        input, button { width: 100%; padding: 12px; margin: 10px 0; border-radius: 6px; border: 1px solid var(--border); box-sizing: border-box; font-size: 1rem; }
        input { background: #0f172a; color: #fff; }
        button { background: var(--accent); color: #000; font-weight: bold; cursor: pointer; }
        button:disabled { background: #475569; color: #94a3b8; cursor: not-allowed; }
        
        /* ĐÁP ÁN CUỐN CHIẾU */
        .choice-btn { text-align: left; background: #1e293b; color: #fff; transition: all 0.2s; }
        .choice-btn:not(:disabled):hover { background: #334155; }
        
        /* PHÒNG CHAT GIẢI LAO */
        .chat-area { height: 180px; overflow-y: auto; background: #0f172a; border: 1px solid var(--border); padding: 10px; border-radius: 6px; text-align: left; font-size: 0.95rem; margin-bottom: 10px; }
        .msg-line { margin: 4px 0; border-bottom: 1px dashed #1e3a5f; padding-bottom: 2px; }
    </style>
</head>
<body>

    <div id="top-progress-container">
        <div id="top-progress-bar"></div>
    </div>

    <div id="lobby-screen" class="screen active">
        <h2 style="font-family:'Orbitron'; color:var(--accent);">VẬT LÍ ARENA</h2>
        <input type="text" id="input-room-id" placeholder="MÃ PHÒNG (Ví dụ: ABCD)">
        <input type="text" id="input-name" placeholder="NHẬP TÊN CỦA BẠN">
        <button onclick="joinRoom()">VÀO PHÒNG CHỜ</button>
    </div>

    <div id="game-screen" class="screen">
        <div style="display:flex; justify-content:space-between; margin-bottom:15px; color:var(--accent);">
            <span id="stage-title">STAGE 1</span>
            <span id="timer-text" style="font-family:'Orbitron'; font-weight:bold;">60s</span>
        </div>
        <div id="question-box">
            </div>
    </div>

    <div id="intermission-screen" class="screen">
        <h3 style="color:#00ff88; margin-top:0;">HẾT CHẶNG – NGHỈ GIẢI LAO (<span id="break-timer">30</span>s)</h3>
        <div style="display:flex; justify-content:space-around; background:#1e293b; padding:10px; border-radius:6px; font-weight:bold; margin-bottom:15px;">
            <span style="color:#ff4a4a;">Đội A: <span id="score-a">0</span>đ</span>
            <span style="color:#00d2ff;">Đội B: <span id="score-b">0</span>đ</span>
        </div>
        
        <div class="chat-area" id="chat-logs"></div>
        <div style="display:flex; gap:6px;">
            <input type="text" id="chat-input" placeholder="Tán gẫu tự do tại đây..." style="margin:0;" onkeypress="if(event.key==='Enter') sendChat()">
            <button onclick="sendChat()" style="width:auto; padding:0 20px; margin:0;">Gửi</button>
        </div>
    </div>

    <script>
        const socket = io();
        let currentRoomId = '';
        let myTeam = '';
        let currentQuestions = [];
        let questionIndex = 0;
        let isAnsweringState = false;

        // TỰ ĐỘNG QUÉT VÀ ĐIỀN MÃ PHÒNG TỪ QR CODE URL (?room=ABCD)
        window.addEventListener('DOMContentLoaded', () => {
            const params = new URLSearchParams(window.location.search);
            const roomParam = params.get('room');
            if (roomParam) {
                document.getElementById('input-room-id').value = roomParam.toUpperCase();
                document.getElementById('input-name').focus();
            }
        });

        function switchScreen(screenId) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(screenId).classList.add('active');
        }

        function joinRoom() {
            const roomId = document.getElementById('input-room-id').value.trim();
            const name = document.getElementById('input-name').value.trim();
            if (!roomId || !name) return alert('Vui lòng điền đủ mã phòng và tên!');
            currentRoomId = roomId.toUpperCase();
            socket.emit('playerJoinRoom', { roomId: currentRoomId, name });
        }

        socket.on('joinedRoom', () => {
            document.getElementById('question-box').innerHTML = '<h3>Đã vào phòng chờ thành công! Đang đợi admin bắt đầu game...</h3>';
            switchScreen('game-screen');
        });

        socket.on('roleAssignment', (data) => { myTeam = data.team; });

        // KHỞI CHẠY CHẶNG MỚI: BẮT ĐẦU CÂU HỎI CUỐN CHIẾU 1
        socket.on('startStage', (data) => {
            isAnsweringState = true;
            currentQuestions = data.questions;
            questionIndex = 0;
            document.getElementById('stage-title').innerText = `STAGE ${data.stageNum} ${data.isDouble ? ' (X2 ĐIỂM)' : ''}`;
            document.getElementById('top-progress-container').style.display = 'block';
            switchScreen('game-screen');
            renderSingleQuestion();
        });

        function renderSingleQuestion() {
            const box = document.getElementById('question-box');
            if (questionIndex >= currentQuestions.length) {
                box.innerHTML = `<div style="padding:20px;"><h3>Hoàn thành chặng!</h3><p>Đang chờ các người chơi khác hoàn tất...</p></div>`;
                return;
            }
            const q = currentQuestions[questionIndex];
            let html = `
                <div style="font-size:0.9rem; color:#94a3b8; text-align:left; margin-bottom:5px;">Câu hỏi ${questionIndex + 1}/${currentQuestions.length}</div>
                <h3 style="text-align:left; line-height:1.5; margin-bottom:20px;">${q.text}</h3>
                <div style="display:flex; flex-direction:column; gap:10px;">
            `;
            q.choices.forEach(c => {
                html += `<button class="choice-btn" onclick="selectAnswer('${q.id}', '${c.key}')"><strong>${c.key}.</strong> ${c.text}</button>`;
            });
            html += `</div><div id="feedback-badge" style="margin-top:15px; font-size:1.4rem; font-weight:bold;"></div>`;
            box.innerHTML = html;
        }

        function selectAnswer(questionId, choiceKey) {
            document.querySelectorAll('.choice-btn').forEach(b => b.disabled = true);
            socket.emit('submitSingleAnswer', { roomId: currentRoomId, questionId, answer: choiceKey });
        }

        // NHẬN BIẾN ĐỘNG ĐIỂM TRỰC TIẾP (+/-) VÀ CHUYỂN CÂU HỎI
        socket.on('singleAnswerResult', (data) => {
            const badge = document.getElementById('feedback-badge');
            if (data.isCorrect) {
                badge.innerHTML = `<span style="color:#00ff88;">✓ ĐÚNG (${data.points})</span>`;
            } else {
                badge.innerHTML = `<span style="color:#ff4a4a;">✗ SAI (${data.points})</span>`;
            }
            setTimeout(() => {
                questionIndex++;
                renderSingleQuestion();
            }, 1200);
        });

        // ĐỒNG HỒ 60S CO RÚT, ĐỔI MÀU / ĐỒNG HỒ NGHỈ GIẢI LAO
        socket.on('timerUpdate', (timeLeft) => {
            if (isAnsweringState) {
                document.getElementById('timer-text').innerText = timeLeft + 's';
                const percent = (timeLeft / 60) * 100;
                const bar = document.getElementById('top-progress-bar');
                bar.style.width = percent + '%';
                if (percent > 50) bar.style.backgroundColor = '#00ff88';
                else if (percent > 20) bar.style.backgroundColor = '#ffaa00';
                else bar.style.backgroundColor = '#ff4a4a';
            } else {
                const el = document.getElementById('break-timer');
                if (el) el.innerText = timeLeft;
            }
        });

        // BẮT ĐẦU MÀN HÌNH NGHỈ GIẢI LAO KÈM CHAT ROOM 30S
        socket.on('intermissionStart', (data) => {
            isAnsweringState = false;
            document.getElementById('top-progress-container').style.display = 'none';
            document.getElementById('score-a').innerText = data.scoreA;
            document.getElementById('score-b').innerText = data.scoreB;
            document.getElementById('chat-logs').innerHTML = `<p style="color:gray; font-style:italic; margin:0;">Mở phòng chat tự do công khai 30s...</p>`;
            switchScreen('intermission-screen');
        });

        function sendChat() {
            const input = document.getElementById('chat-input');
            const msg = input.value.trim();
            if (!msg) return;
            socket.emit('sendGlobalMessage', { roomId: currentRoomId, msg });
            input.value = '';
        }

        socket.on('receiveGlobalMessage', (data) => {
            const logs = document.getElementById('chat-logs');
            const teamColor = data.team === 'A' ? '#ff4a4a' : '#00d2ff';
            logs.innerHTML += `<div class="msg-line"><strong style="color:${teamColor}">${data.name}:</strong> ${data.msg}</div>`;
            logs.scrollTop = logs.scrollHeight;
        });

        socket.on('gameOver', (d) => {
            document.getElementById('top-progress-container').style.display = 'none';
            document.getElementById('question-box').innerHTML = `<h2>TRÒ CHƠI KẾT THÚC</h2><h3>ĐỘI CHIẾN THẮNG: ĐỘI ${d.winningTeam}</h3>`;
            switchScreen('game-screen');
        });
        socket.on('errorMsg', m => alert(m));
    </script>
</body>
</html>
